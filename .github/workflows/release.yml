name: Tests

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install test dependencies
        run: python -m pip install --upgrade pip pytest

      - name: Install package with Pyomo, SCIP and HiGHS extras
        run: python -m pip install -e ".[scip,highs,bridge]"

      - name: Run base test profile
        run: PYTHONPATH=src pytest -q -m "not scip and not gurobi and not glpk and not highs and not data and not bridge"

      - name: Run SCIP test profile
        run: PYTHONPATH=src pytest -q -m "scip"

      - name: Run HiGHS test profile
        run: PYTHONPATH=src pytest -q -m "highs"

      - name: Run Bridge test profile
        run: PYTHONPATH=src pytest -q -m "bridge"
